<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact JiTpro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Contact JiTpro</h1>
  </header>

  <main>
    <form action="https://formspree.io/f/mdkqbbar" method="POST">
      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com" />

      <label for="message">Your Message:</label>
      <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>

      <!-- Spam protection -->
      <input type="text" name="_gotcha" style="display:none" />

      <!-- Redirect -->
      <input type="hidden" name="_next" value="https://jit-pro.com/thanks.html" />

      <button type="submit">Send Message</button>
    </form>
  </main>
</body>
</html>
