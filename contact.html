<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact JiTpro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('JiTpro-Background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="bg-black bg-opacity-50 flex items-center justify-center min-h-screen">
  <div class="bg-white bg-opacity-90 p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
    <img src="jitpro-logo.svg" alt="JiTpro Logo" class="mx-auto mb-6 w-40 h-auto">
    <h2 class="text-2xl font-bold mb-6">Contact Us</h2>
    <form action="https://formspree.io/f/mdkqbbar" method="POST" class="space-y-4 text-left">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" id="name" name="name" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label for="message" class="block text-sm font-medium text-gray-700">How Can We Help?</label>
        <textarea id="message" name="message" rows="5" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500"></textarea>
      </div>
      <input type="text" name="_gotcha" style="display:none">
      <input type="hidden" name="_next" value="https://jit-pro.com/thanks.html">
      <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-xl hover:bg-blue-700 transition">Send Message</button>
    </form>
  </div>
</body>
</html>
